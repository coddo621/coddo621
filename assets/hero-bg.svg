<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://w3.org">
  <rect width="800" height="200" fill="#1a0a06" />
  <!-- Moving Gradient Stripes -->
  <g filter="url(#blur)">
    <rect x="-400" y="-100" width="1600" height="400" fill="url(#slowRushGrad)">
      <animateTransform 
        attributeName="transform" 
        type="rotate" 
        from="0 400 100" 
        to="360 400 100" 
        dur="20s" 
        repeatCount="indefinite" />
    </rect>
  </g>
  <defs>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" />
    </filter>
    <linearGradient id="slowRushGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78bbc1" />
      <stop offset="25%" stop-color="#dfdada" />
      <stop offset="50%" stop-color="#ff4d2e" />
      <stop offset="75%" stop-color="#ff8c00" />
      <stop offset="100%" stop-color="#78bbc1" />
    </linearGradient>
  </defs>
</svg>
